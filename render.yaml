services:

  - type: web
    name: planify-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/schema/
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: SECRET_KEY
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: REDIS_URL
        fromService:
          name: planify-redis
          type: redis
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ALLOW_ALL
        value: "False"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CORS_ALLOW_CREDENTIALS
        value: "False"
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: USE_S3
        value: "False"
      - key: LOG_LEVEL
        value: WARNING
      - key: DJANGO_LANGUAGE_CODE
        value: es-co
      - key: DJANGO_TIMEZONE
        value: America/Bogota

  - type: redis
    name: planify-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []